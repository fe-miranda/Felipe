name: Build GymApp Android APK

on:
  push:
    branches:
      - main
    paths:
      - 'GymApp/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'GymApp/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GymApp/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: GymApp
        run: npm ci

      - name: Generate native Android project
        working-directory: GymApp
        run: npx expo prebuild --platform android --clean

      - name: Pin Gradle to 8.13 (Gradle 9 removed APIs used in build.gradle)
        working-directory: GymApp/android
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Patch build.gradle — remove hermesCommand (bundled with RN 0.71+)
        working-directory: GymApp/android
        run: |
          sed -i '/hermesCommand\s*=/d' app/build.gradle

      - name: Make gradlew executable
        working-directory: GymApp/android
        run: chmod +x gradlew

      - name: Build release APK (bundles JS automatically)
        working-directory: GymApp/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymAI-release
          path: GymApp/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
