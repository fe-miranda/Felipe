name: Build Android APK

on:
  push:
    branches:
      - claude/create-new-app-enSnZ
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GymApp/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: GymApp
        run: npm install

      - name: Generate native Android project
        working-directory: GymApp
        run: npx expo prebuild --platform android --clean

      - name: Fix hermesCommand for RN 0.81 (hermes-compiler package not available until RN 0.83+)
        working-directory: GymApp/android
        run: |
          python3 << 'EOF'
          import re
          with open('app/build.gradle', 'r') as f:
              content = f.read()
          # Expo 55 template references 'hermes-compiler' which doesn't exist in RN 0.81.x.
          # Replace with the bundled hermesc path inside the react-native package.
          content = re.sub(
              r"hermesCommand = new File\(\[.*?hermes-compiler.*?\]\.execute\(null, rootDir\)\.text\.trim\(\)\)\.getParentFile\(\)\.getAbsolutePath\(\) \+ \"/hermesc/%OS-BIN%/hermesc\"",
              'hermesCommand = new File(["node", "--print", "require.resolve(\'react-native/package.json\')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile().toString() + "/sdks/hermesc/%OS-BIN%/hermesc"',
              content,
              flags=re.DOTALL
          )
          with open('app/build.gradle', 'w') as f:
              f.write(content)
          print("Patched hermesCommand in app/build.gradle")
          EOF

      - name: Pin Gradle to 8.13 (Gradle 9 removed APIs used in build.gradle)
        working-directory: GymApp/android
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        working-directory: GymApp/android
        run: chmod +x gradlew

      - name: Build release APK (bundles JS automatically)
        working-directory: GymApp/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymAI-release
          path: GymApp/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
