name: Build Android APK

on:
  push:
    branches:
      - claude/create-new-app-enSnZ
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GymApp/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: GymApp
        run: npm install

      - name: Generate native Android project
        working-directory: GymApp
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: GymApp/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: GymApp/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymAI-debug
          path: GymApp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
