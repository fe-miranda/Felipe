name: 🌍 Build APK — Mundo das Descobertas

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Toolchain ──────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: MundoDescobertas/package.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. JS dependencies ────────────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: MundoDescobertas
        run: npm ci

      - name: TypeScript check
        working-directory: MundoDescobertas
        run: npm run test

      # ── 4. Generate native Android project ───────────────────────────────
      # expo prebuild converts the managed Expo project into a bare React
      # Native project with a real android/ folder — no EAS / Expo account
      # needed for this step.
      - name: Expo prebuild
        working-directory: MundoDescobertas
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      # ── 5. Signing keystore (generated fresh each run) ───────────────────
      - name: Generate release keystore
        working-directory: MundoDescobertas/android/app
        run: |
          keytool -genkeypair \
            -keystore release.keystore \
            -alias release-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=MundoDescobertas,O=Jogo,C=BR" \
            -storepass mundoapp \
            -keypass mundoapp \
            -noprompt

      - name: Write signing properties to gradle.properties
        working-directory: MundoDescobertas/android
        run: |
          printf '\nMYAPP_UPLOAD_STORE_FILE=release.keystore\n' >> gradle.properties
          printf 'MYAPP_UPLOAD_KEY_ALIAS=release-key\n'         >> gradle.properties
          printf 'MYAPP_UPLOAD_STORE_PASSWORD=mundoapp\n'       >> gradle.properties
          printf 'MYAPP_UPLOAD_KEY_PASSWORD=mundoapp\n'         >> gradle.properties

      # ── 6. Build ──────────────────────────────────────────────────────────
      - name: Build release APK
        working-directory: MundoDescobertas/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3500m -XX:MaxMetaspaceSize=512m"

      # ── 7. Collect APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find MundoDescobertas/android/app/build/outputs/apk/release \
                     -name "*.apk" | head -1)
          cp "$APK" "mundo-das-descobertas-v${{ github.run_number }}.apk"

      # ── 8. Upload artifact (download from Actions UI) ─────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mundo-das-descobertas-v${{ github.run_number }}
          path: mundo-das-descobertas-v${{ github.run_number }}.apk
          retention-days: 30

      # ── 9. Print download instructions in job summary ─────────────────────
      - name: Job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ APK gerado com sucesso!

          ### 📱 Como instalar no celular

          1. Role esta página até a seção **Artifacts**
          2. Clique em **mundo-das-descobertas-v${{ github.run_number }}**
          3. Extraia o `.apk` do arquivo zip baixado
          4. Transfira para o Android e instale
             - Ative **"Instalar de fontes desconhecidas"** em
               Configurações → Segurança (ou Privacidade)
          EOF
