name: Build Android APK

on:
  push:
    branches:
      - claude/create-new-app-enSnZ
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GymApp/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        working-directory: GymApp
        run: npm install

      - name: Generate native Android project
        working-directory: GymApp
        run: npx expo prebuild --platform android --clean

      - name: Bundle JavaScript into APK assets
        working-directory: GymApp
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Make gradlew executable
        working-directory: GymApp/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: GymApp/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GymAI-release
          path: GymApp/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
